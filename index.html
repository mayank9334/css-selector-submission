<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>selectors in css</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="head" >this is h1 heading with "head" as a class </h1>
    
    <h2 id="bglime" class="head" >this is h2 heading with <span> "head" </span> as a class</h2>
    
    <h3 class="head" >this is h3 heading with "head" as a class</h3>
  </header>
  
  <main>
    <p>this a paragraph tag without id and class.</p>
    <p id="para" >this a <span id="paragraph" >paragraph</span> tag without id and class.</p>
    <p>this a paragraph tag without id and class.</p>
  </main>
</body>
</html>
